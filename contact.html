<!doctype html>
<html lang="en" class="h-full">
<head>
<script src="Pages/js/main.js"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - InterviewHub</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Light Mode Colors */
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: rgba(0,0,0,0.1);
      --primary: #0ea5e9;
      --font: 'DM Sans', sans-serif;
    }

    .dark {
      /* Dark Mode Colors */
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.06);
      --primary: #38bdf8;
    }

    body { 
        font-family: var(--font); 
        background: var(--bg); 
        color: var(--text); 
        transition: background 0.3s, color 0.3s;
    }

    .header { 
        background: var(--surface); 
        border-bottom: 1px solid var(--border); 
        position: sticky; 
        top: 0; 
        z-index: 100; 
    }

    .footer { 
        background: var(--surface); 
        border-top: 1px solid var(--border); 
        padding: 48px 20px 24px; 
        margin-top: 60px; 
    }

    .input-field {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
    }

    .toast { 
        position: fixed; 
        bottom: 24px; 
        left: 50%; 
        transform: translateX(-50%) translateY(80px); 
        padding: 12px 28px; 
        border-radius: 10px; 
        font-weight: 600; 
        opacity: 0; 
        transition: all .4s; 
        z-index: 300; 
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body class="dark"> <div id="h1"></div>
  <main class="max-w-2xl mx-auto px-6 py-16">
    <div class="text-center mb-10">
      <h1 class="font-mono text-4xl mb-2" style="color: var(--primary)">Contact Us</h1>
      <p style="color: var(--text-muted)">Send us a message, and we will get back to you as soon as possible.</p>
    </div>

    <form id="contactForm" class="p-8 rounded-2xl border shadow-xl" style="background: var(--surface); border-color: var(--border);">
      
      <div class="mb-5">
        <label class="block text-xs font-bold uppercase mb-2" style="color: var(--text-muted)">Full Name</label>
        <input name="from_name" type="text" required placeholder="Enter your name" class="w-full input-field p-3 rounded-xl focus:ring-2 focus:ring-sky-400 outline-none transition">
      </div>

      <div class="mb-5">
        <label class="block text-xs font-bold uppercase mb-2" style="color: var(--text-muted)">Email Address</label>
        <input name="user_email" type="email" required placeholder="name@example.com" class="w-full input-field p-3 rounded-xl focus:ring-2 focus:ring-sky-400 outline-none transition">
      </div>

      <div class="mb-8">
        <label class="block text-xs font-bold uppercase mb-2" style="color: var(--text-muted)">Message</label>
        <textarea name="message" required rows="5" placeholder="How can we help you?" class="w-full input-field p-3 rounded-xl focus:ring-2 focus:ring-sky-400 outline-none resize-none transition"></textarea>
      </div>

      <button type="submit" id="sendBtn" class="w-full font-bold py-4 rounded-xl hover:opacity-90 transition-all flex items-center justify-center gap-2" style="background: var(--primary); color: #0f172a;">
        <span id="btnText">Send Message</span>
      </button>
    </form>
  </main>
<div id="f1"></div>

  <div id="toast" class="toast"></div>

  <script type="text/javascript">
    // 1. EmailJS Configuration
    const SERVICE_ID = 'service_1h6hjlz';
    const TEMPLATE_ID = 'template_04sq9j8';
    const PUBLIC_KEY = 'q-HPNvOIc20O5ryna';

    (function() {
      emailjs.init(PUBLIC_KEY);
    })();

    // 2. Form Submission Logic
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('sendBtn');
      const btnText = document.getElementById('btnText');

      btnText.textContent = "Sending...";
      btn.disabled = true;

      emailjs.sendForm(SERVICE_ID, TEMPLATE_ID, this)
        .then(() => {
          showToast("✓ Message sent successfully!", "#22c55e");
          this.reset();
        })
        .catch((err) => {
          showToast("❌ Error! Please try again.", "#ef4444");
        })
        .finally(() => {
          btnText.textContent = "Send Message";
          btn.disabled = false;
        });
    });

    // 3. Toast Notification Logic
    function showToast(msg, color) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.background = color;
      toast.style.color = "white";
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // 4. Dark/Light Mode Logic
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const body = document.body;

    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      if(body.classList.contains('dark')) {
        themeIcon.textContent = "☀️";
        localStorage.setItem('theme', 'dark');
      } else {
        themeIcon.textContent = "🌙";
        localStorage.setItem('theme', 'light');
      }
    });

    // Check for saved user preference
    const savedTheme = localStorage.getItem('theme');
    if(savedTheme === 'light') {
        body.classList.remove('dark');
        themeIcon.textContent = "🌙";
    }
  </script>
</body>
</html>
