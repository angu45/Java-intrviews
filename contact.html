<!doctype html>
<html lang="en" class="h-full">
<head>
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-MJGXDD8J');</script>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - InterviewHub</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #e2e8f0;
      --primary: #38bdf8;
      --font: 'DM Sans', sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); }
    .header { background: var(--surface); border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; z-index: 100; }
    .logo-img { height: 38px; }
    .footer { background: var(--surface); border-top: 1px solid rgba(255,255,255,0.06); padding: 48px 20px 24px; margin-top: 60px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); padding: 12px 28px; border-radius: 10px; font-weight: 600; opacity: 0; transition: all .4s; z-index: 300; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <header class="header">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="logo">
        <a href="https://interview-hub.in/">
          <img src="Logo.png" alt="InterviewHub" class="logo-img" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span style=&quot;font-weight:700;font-size:20px;color:var(--primary)&quot;>InterviewHub</span>')">
        </a>
      </div>
      <nav class="hidden md:flex gap-6">
        <a href="https://interview-hub.in/" class="hover:text-sky-400 transition">Home</a>
        <a href="https://interview-hub.in/Pages/basic-java-interview-questions.html" class="hover:text-sky-400 transition">Java</a>
        <a href="https://interview-hub.in/contact.html" class="text-sky-400">Contact</a>
      </nav>
      <button class="md:hidden">☰</button>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-6 py-16">
    <div class="text-center mb-10">
      <h1 class="font-mono text-4xl text-sky-400 mb-2">Contact Us</h1>
      <p class="text-slate-400">मेसेज पाठवा, आम्ही लवकरच उत्तर देऊ.</p>
    </div>

    <form id="contactForm" class="bg-slate-800 p-8 rounded-2xl border border-white/5 shadow-xl">
      
      <div class="mb-5">
        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Full Name</label>
        <input name="from_name" type="text" required placeholder="तुमचे नाव" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl focus:border-sky-400 outline-none text-white transition">
      </div>

      <div class="mb-5">
        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Email Address</label>
        <input name="user_email" type="email" required placeholder="तुमचा ईमेल" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl focus:border-sky-400 outline-none text-white transition">
      </div>

      <div class="mb-8">
        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Message</label>
        <textarea name="message" required rows="5" placeholder="तुमचा मेसेज इथे लिहा..." class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl focus:border-sky-400 outline-none text-white resize-none transition"></textarea>
      </div>

      <button type="submit" id="sendBtn" class="w-full bg-sky-400 text-slate-900 font-bold py-4 rounded-xl hover:bg-sky-300 transition-all flex items-center justify-center gap-2">
        <span id="btnText">Send Message</span>
      </button>
    </form>
  </main>

  <footer class="footer text-center md:text-left">
    <div class="max-w-7xl mx-auto grid md:grid-cols-3 gap-10 px-6 pb-10">
        <div>
            <h4 class="text-sky-400 font-bold mb-4">InterviewHub</h4>
            <p class="text-slate-400 text-sm leading-relaxed">Your complete platform to prepare for Java interviews and technical concepts.</p>
        </div>
        <div>
            <h4 class="text-sky-400 font-bold mb-4">Links</h4>
            <a href="https://interview-hub.in/" class="text-slate-400 text-sm block mb-2 hover:text-sky-400">Home</a>
            <a href="https://interview-hub.in/contact.html" class="text-slate-400 text-sm block hover:text-sky-400">Contact</a>
        </div>
        <div>
            <h4 class="text-sky-400 font-bold mb-4">Contact</h4>
            <p class="text-slate-400 text-sm">Email: support@interview-hub.in</p>
        </div>
    </div>
    <div class="border-top border-white/5 pt-6 text-center text-slate-500 text-xs">
        © 2026 InterviewHub. All rights reserved.
    </div>
  </footer>

  <div id="toast" class="toast"></div>

  <script type="text/javascript">
    // १. तुझे ID इथे टाकले आहेत
    const SERVICE_ID = 'service_1h6hjlz';
    const TEMPLATE_ID = 'template_04sq9j8';
    const PUBLIC_KEY = 'q-HPNvOIc20O5ryna';

    (function() {
      emailjs.init(PUBLIC_KEY);
    })();

    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('sendBtn');
      const btnText = document.getElementById('btnText');
      const toast = document.getElementById('toast');

      btnText.textContent = "Sending...";
      btn.disabled = true;

      // emailjs.sendForm वापरल्याने फॉर्ममधील सर्व डेटा (from_name, user_email, message) टेम्पलेटमध्ये जातो
      emailjs.sendForm(SERVICE_ID, TEMPLATE_ID, this)
        .then(() => {
          showToast("✓ मेसेज यशस्वीरित्या पाठवला!", "#22c55e");
          this.reset();
        })
        .catch((err) => {
          showToast("❌ एरर! पुन्हा प्रयत्न करा.", "#ef4444");
        })
        .finally(() => {
          btnText.textContent = "Send Message";
          btn.disabled = false;
        });
    });

    function showToast(msg, color) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.background = color;
      toast.style.color = "white";
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }
  </script>
</body>
</html>
