<!DOCTYPE html>
<html lang="en">
<head>
<script src="/Pages/Assets/js/main.js"></script>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | InterviewHub</title>

    <link rel="stylesheet" href="/css/style.css">

    <style>
        .error-container {
            text-align: center;
            padding: 100px 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .error-code {
            font-size: 120px;
            font-weight: 900;
            color: #3498db;
            margin: 0;
            line-height: 1;
        }
        .error-message {
            font-size: 24px;
            color: #2c3e50;
            margin: 20px 0;
        }
        .error-desc {
            color: #7f8c8d;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .home-btn {
            background-color: #3498db;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
            display: inline-block;
        }
        .home-btn:hover {
            background-color: #2980b9;
        }
        .search-hint {
            margin-top: 50px;
            font-size: 0.9em;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

  <div id="h1"></div>

    <main class="main-content">
        <div class="error-container">
            <h1 class="error-code">404</h1>
            <p class="error-message">Oops! Page Missing.</p>
            <p class="error-desc">
                The page you are looking for might have been removed, had its name changed, 
                or is temporarily unavailable. Let's get you back on track to cracking your interview!
            </p>
            
            <a href="https://interview-hub.in" class="home-btn">Return to Home Page</a>

            <p class="search-hint">
                Lost? Try navigating through our Roadmap or Question Bank in the footer.
            </p>
        </div>
    </main>
<div id="f1"></div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const menuBtn = document.getElementById('menu-btn');
        const nav = document.getElementById('nav');
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        menuBtn?.addEventListener('click', () => {
            nav?.classList.toggle('active');
            menuBtn.textContent = nav?.classList.contains('active') ? '✖' : '☰';
        });

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            body.classList.add('dark-theme');
            themeToggle.textContent = '☀️';
        }

        themeToggle?.addEventListener('click', () => {
            body.classList.toggle('dark-theme');
            let theme = body.classList.contains('dark-theme') ? 'dark' : 'light';
            themeToggle.textContent = (theme === 'dark') ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        });
    });
    </script>
</body>
</html>
